name: Deploy

# Dispara quando o workflow de CI completa na branch main.
# O deploy só avança se o CI passou (conclusion == 'success').
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Faz checkout do commit que disparou o CI, não o HEAD atual
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Docker meta (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Iniciar container para smoke test
        run: |
          docker run -d --name smoke \
            -e FLASK_ENV=development \
            -e FLASK_SECRET_KEY=smoke-test-only \
            -e DATABASE_URL="sqlite:////tmp/smoke.db" \
            -e MAIL_SERVER=localhost \
            -e MAIL_PORT=25 \
            -e MAIL_USE_TLS=false \
            -p 5001:5000 \
            ghcr.io/${{ github.repository }}:latest
          sleep 10

      - name: Verificar resposta HTTP da aplicação
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/login)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test falhou — esperado 200, recebido $STATUS"
            docker logs smoke
            exit 1
          fi
          echo "Smoke test passou."

      - name: Encerrar container
        if: always()
        run: docker stop smoke && docker rm smoke

