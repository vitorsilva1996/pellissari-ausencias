<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: Arial, sans-serif; }
    .wrapper { max-width: 560px; margin: 32px auto; background: #ffffff;
               border-radius: 8px; overflow: hidden;
               box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #0d6efd; padding: 24px 32px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 18px; font-weight: 700; }
    .header p  { margin: 4px 0 0; color: rgba(255,255,255,.8); font-size: 13px; }
    .body  { padding: 28px 32px; color: #333; font-size: 14px; line-height: 1.6; }
    .body h2  { margin: 0 0 16px; font-size: 16px; color: #0d6efd; }
    .info-box { background: #f8f9fa; border-left: 4px solid #0d6efd;
                border-radius: 4px; padding: 14px 18px; margin: 18px 0; }
    .info-box .row { display: flex; justify-content: space-between;
                     padding: 4px 0; font-size: 13px; }
    .info-box .label { color: #666; }
    .info-box .value { font-weight: 600; color: #222; }
    .badge-ok  { display: inline-block; background: #198754; color: #fff;
                 border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
    .badge-err { display: inline-block; background: #dc3545; color: #fff;
                 border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
    .badge-warn{ display: inline-block; background: #ffc107; color: #333;
                 border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
    .btn { display: inline-block; background: #0d6efd; color: #fff !important;
           text-decoration: none; padding: 10px 22px; border-radius: 6px;
           font-size: 14px; font-weight: 600; margin-top: 18px; }
    .footer { background: #f0f2f5; padding: 16px 32px; font-size: 11px;
              color: #888; text-align: center; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Pellissari — Sistema de Ausências</h1>
    <p>Notificação automática</p>
  </div>
  <div class="body">
    {% block body %}{% endblock %}
  </div>
  <div class="footer">
    Esta é uma mensagem automática. Não responda a este e-mail.<br>
    Pellissari &copy; {{ now.year if now else '2025' }}
  </div>
</div>
</body>
</html>
