{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<style>
  body { background:#f1f3f5 !important; }
  .login-card { border-radius:16px; border:none; box-shadow:0 4px 24px rgba(0,0,0,.10); }
  .btn-brand { background:#C0392B; border-color:#C0392B; color:#fff; font-weight:600; }
  .btn-brand:hover { background:#a93226; border-color:#a93226; color:#fff; }
  .form-control:focus { border-color:#C0392B; box-shadow:0 0 0 .2rem rgba(192,57,43,.2); }
</style>

<div class="d-flex justify-content-center align-items-center"
     style="min-height:calc(100vh - 8rem)">
    <div style="width:100%;max-width:380px">

        {# ── Marca ── #}
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                 style="background:#C0392B;width:56px;height:56px">
                <span style="color:#fff;font-size:1.6rem;font-weight:900;line-height:1">P</span>
            </div>
            <div class="fw-black fs-5 mb-0" style="letter-spacing:.03em">PELLISSARI</div>
            <div class="text-muted small" style="letter-spacing:.12em;font-size:.72rem">FLUIDEZ DIGITAL</div>
        </div>

        {# ── Card ── #}
        <div class="card login-card">
            <div class="card-body p-4 p-sm-5">
                <h5 class="fw-bold mb-1">Acessar o sistema</h5>
                <p class="text-muted small mb-4">Informe suas credenciais corporativas</p>

                <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold small">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email"
                               autocomplete="email" autofocus required
                               placeholder="voce@pellissari.com.br">
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label fw-semibold small">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha"
                               autocomplete="current-password" required>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label text-muted small" for="remember">Lembrar-me</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 py-2">Entrar</button>
                </form>
            </div>
        </div>

        <div class="text-center mt-4 text-muted" style="font-size:.75rem">
            © {{ now.year }} Pellissari Fluidez Digital
        </div>
    </div>
</div>
{% endblock %}
