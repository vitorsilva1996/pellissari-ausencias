services:
  app:
    build: .
    container_name: pellissari_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: development
    volumes:
      - .:/app
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pellissari_net

  db:
    image: mysql:8.0
    container_name: pellissari_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pellissari_net

volumes:
  mysql_data:
  app_logs:

networks:
  pellissari_net:
    driver: bridge
